<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secured Viewer</title>
    <style>

		.back-button {
    display: inline-block;
    background-color: #ff4400;
    color: #fff;
    border: none;
    border-radius: 22px;
    padding: 0.6em 1.4em;
    font-size: 1em;
    font-weight: 500;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(255, 214, 202, 0.25);
    transition: background 0.18s, box-shadow 0.18s;
    text-decoration: none;
}

.back-button:hover {
    background: #d93900;
    box-shadow: 0 4px 10px rgba(255, 68, 0, 0.4);
}

/* Fixed container that follows scroll */
.back-button-container {
    position: fixed; /* Makes it stick while scrolling */
    top: 20px; /* Distance from top of viewport */
    left: 20px; /* Distance from left edge */
    z-index: 1000; /* Ensures it stays on top of other content */
}

@media (max-width: 600px) {
    .back-button { 
        font-size: 0.9em;
        padding: 0.5em 1.2em;
    }
    .back-button-container {
        top: 15px;
        left: 10px;
    }
}

		
	/* 1. Global Page and Main Background Settings */
        body {
            margin: 0;
            padding: 40px 0;
	    background-image: url('../images/tech.jpg');
	    background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #222222;
	    background-position: center;
            background-size: cover; /* Smoothly shrinks/scales full background */
            display: flex;            
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            margin: 0;
            padding: 40px 0;
            background-color: #222222;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .subpage-header {
            text-align: center;
            margin-bottom: 30px;
            color: #ffffff;
        }

        /* The container holding the viewer and the shield wrapper */
        .viewer-wrapper {
            position: relative;
            max-width: 900px;
            width: 95%;
            height: 21900px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            border-radius: 6px;
            overflow: hidden;
        }

        .viewer-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* THE SHIELD LAYER: Blocks interaction with Google's top-right control toolbar */
        .click-shield {
            position: absolute;
            top: 0;
            right: 0;
            width: 900px;  /* Covers the entire top right button cluster area */
            height: 120000px;  /* Covers the height of Google's toolbar button */
            background-color: rgba(255, 255, 255, 0); /* Completely see-through transparent */
            z-index: 10;   /* Forces it to sit strictly above the iframe */
            cursor: default;
        }
    </style>
</head>


<body>

	<div class="back-button-container">
		<button class="back-button" onclick="window.history.back()">← Back to Main Page</button>
	</div>

    <div class="subpage-header">
        <h1> Certificates </h1>
    </div>

    <!-- Container wrapper -->
    <div class="viewer-wrapper">
        
        <!-- The invisible click blocker -->
        <div class="click-shield"></div>

        <!-- Your standard Google Drive preview iframe embed -->
        <iframe src="https://drive.google.com/file/d/1H-rRMgdLS7kfvOw2EAtuEzourlClStOX/preview" width="640" height="480"></iframe>
    </div>

</body>
</html>
