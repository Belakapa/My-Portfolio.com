
<!DOCTYPE html>

    <title>Secured Project View</title>
    <style>

	/* 1. Global Page and Main Background Settings */
        body {
            margin: 0;
            padding: 40px 0;
	    background-image: url('../images/tech.jpg');
	    background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #222222;
	    background-position: center;
            background-size: cover; /* Smoothly shrinks/scales full background */
            display: flex;            
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            margin: 0;

            background-color: #222222;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            
            /* BLOCKS TEXT SELECTION/HIGHLIGHTING ACROSS THE PAGE */
            -webkit-user-select: none; /* Safari */
            -ms-user-select: none;     /* IE 10 and Edge */
            user-select: none;         /* Standard syntax */
        }

        .subpage-header {
            text-align: center;
            margin-bottom: 30px;
            color: #ffffff;
        }

        .doc-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .secured-page {
            max-width: 850px;
            width: 95%;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            background-color: white;
            display: block;
            
            /* PREVENTS DRAGGING THE IMAGE TO DESKTOP OR TRICK COPYING */
            -webkit-user-drag: none;
            user-select: none;
            pointer-events: none; /* Disables right-click options specifically on the image */
        }
    </style>
</head>
