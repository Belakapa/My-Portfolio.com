<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secured Project View</title>
    <style>

.back-button {
    display: inline-block;
    background-color: #ff4400;
    color: #fff;
    border: none;
    border-radius: 22px;
    padding: 0.6em 1.4em;
    font-size: 1em;
    font-weight: 500;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(255, 214, 202, 0.25);
    transition: background 0.18s, box-shadow 0.18s;
    text-decoration: none;
}

.back-button:hover {
    background: #d93900;
    box-shadow: 0 4px 10px rgba(255, 68, 0, 0.4);
}

/* Fixed container that follows scroll */
.back-button-container {
    position: fixed; /* Makes it stick while scrolling */
    top: 20px; /* Distance from top of viewport */
    left: 20px; /* Distance from left edge */
    z-index: 1000; /* Ensures it stays on top of other content */
}

@media (max-width: 600px) {
    .back-button { 
        font-size: 0.9em;
        padding: 0.5em 1.2em;
    }
    .back-button-container {
        top: 15px;
        left: 10px;
    }
}

	/* 1. Global Page and Main Background Settings */
        body {
            margin: 0;
            padding: 40px 0;
	    background-image: url('../images/tech.jpg');
	    background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #222222;
	    background-position: center;
            background-size: cover; /* Smoothly shrinks/scales full background */
            display: flex;            
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            margin: 0;
            padding: 40px 0;
            background-color: #222222;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            
            /* BLOCKS TEXT SELECTION/HIGHLIGHTING ACROSS THE PAGE */
            -webkit-user-select: none; /* Safari */
            -ms-user-select: none;     /* IE 10 and Edge */
            user-select: none;         /* Standard syntax */
        }

        .subpage-header {
            text-align: center;
            margin-bottom: 30px;
            color: #ffffff;
        }

        .doc-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .secured-page {
            max-width: 850px;
            width: 95%;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            background-color: white;
            display: block;
            
            /* PREVENTS DRAGGING THE IMAGE TO DESKTOP OR TRICK COPYING */
            -webkit-user-drag: none;
            user-select: none;
            pointer-events: none; /* Disables right-click options specifically on the image */
        }
    </style>
</head>


<!-- BLOCKS RIGHT CLICK POPUP MENUS ON THE ENTIRE PAGE -->
